# ──────────── Server ────────────
server.port=8080

# ──────────── MySQL (port 3307) ────────────
spring.datasource.url=jdbc:mysql://localhost:3307/scheme_recommender?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────────── JPA / Hibernate ────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ──────────── Flyway ────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ──────────── JWT ────────────
jwt.secret=${JWT_SECRET:PotensDevSecretKeyForLocalDevelopmentOnlyDoNotUseInProd32}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ──────────── Recommendation ────────────
recommendation.min-score-percentage=20

# ──────────── Logging ────────────
logging.level.com.potens.schemerecommender=DEBUG
logging.level.org.springframework.security=WARN
